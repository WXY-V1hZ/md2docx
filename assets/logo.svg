<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title description">
  <title id="title">md2docx logo</title>
  <desc id="description">A Markdown bracket flows into a folded document.</desc>

  <rect width="512" height="512" fill="#fff"/>

  <!-- Markdown: an open square bracket -->
  <path
    d="M202 112h-46c-23.2 0-42 18.8-42 42v204c0 23.2 18.8 42 42 42h46"
    fill="none"
    stroke="#17233C"
    stroke-width="28"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <!-- The bracket becomes a forward-moving conversion stream -->
  <path
    d="M168 256h92"
    fill="none"
    stroke="#17233C"
    stroke-width="28"
    stroke-linecap="round"
  />
  <path d="M248 222 290 256 248 290Z" fill="#2B6FF3"/>

  <!-- DOCX: a page drawn with the same visual weight -->
  <path
    d="M304 112h54l68 68v178c0 23.2-18.8 42-42 42h-78c-23.2 0-42-18.8-42-42v-46"
    fill="none"
    stroke="#2B6FF3"
    stroke-width="28"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <!-- Folded corner -->
  <path
    d="M360 114v42c0 12.2 9.8 22 22 22h42"
    fill="none"
    stroke="#2B6FF3"
    stroke-width="18"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <!-- Minimal document lines -->
  <path
    d="M320 326h50M320 354h34"
    fill="none"
    stroke="#17233C"
    stroke-width="14"
    stroke-linecap="round"
  />
</svg>
